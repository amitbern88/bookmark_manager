<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Form</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f0f2f5;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
        }

        .form-card {
            background: #fff;
            border-radius: 16px;
            padding: 2.5rem;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
            width: 100%;
            max-width: 480px;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 700;
            color: #1a1a2e;
            margin-bottom: 0.5rem;
        }

        .subtitle {
            color: #666;
            font-size: 0.9rem;
            margin-bottom: 2rem;
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            color: #333;
            margin-bottom: 0.4rem;
        }

        input, textarea {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            font-size: 0.95rem;
            font-family: inherit;
            transition: border-color 0.2s, box-shadow 0.2s;
            background: #fafafa;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: #4361ee;
            box-shadow: 0 0 0 3px rgba(67, 97, 238, 0.1);
            background: #fff;
        }

        textarea {
            resize: vertical;
            min-height: 120px;
        }

        .submit-btn {
            width: 100%;
            padding: 0.85rem;
            background: #4361ee;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            margin-top: 0.5rem;
        }

        .submit-btn:hover {
            background: #3a56d4;
        }

        .submit-btn:active {
            transform: scale(0.98);
        }

        .success-message {
            display: none;
            text-align: center;
            padding: 1.5rem;
        }

        .success-message.visible {
            display: block;
        }

        .success-icon {
            font-size: 2.5rem;
            margin-bottom: 0.75rem;
        }

        .success-message h2 {
            font-size: 1.25rem;
            color: #1a1a2e;
            margin-bottom: 0.5rem;
        }

        .success-message p {
            color: #666;
            font-size: 0.9rem;
            margin-bottom: 1.5rem;
        }

        .reset-btn {
            background: none;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            padding: 0.6rem 1.25rem;
            font-size: 0.9rem;
            color: #333;
            cursor: pointer;
            transition: background 0.2s;
        }

        .reset-btn:hover {
            background: #f5f5f5;
        }

        .error {
            border-color: #e63946 !important;
            box-shadow: 0 0 0 3px rgba(230, 57, 70, 0.08) !important;
        }

        .error-text {
            color: #e63946;
            font-size: 0.8rem;
            margin-top: 0.3rem;
            display: none;
        }

        .error-text.visible {
            display: block;
        }

        .valid {
            border-color: #2a9d8f !important;
        }

        .required-star {
            color: #e63946;
            margin-left: 2px;
        }
    </style>
</head>
<body>
    <div class="form-card">
        <form id="contact-form">
            <h1>Get in Touch</h1>
            <p class="subtitle">Fill out the form below and we'll get back to you soon.</p>

            <div class="form-group">
                <label for="name">Name<span class="required-star">*</span></label>
                <input type="text" id="name" placeholder="Your name" required>
                <p class="error-text" id="name-error">Name is required.</p>
            </div>

            <div class="form-group">
                <label for="email">Email<span class="required-star">*</span></label>
                <input type="email" id="email" placeholder="you@example.com" required>
                <p class="error-text" id="email-error">Please enter a valid email address.</p>
            </div>

            <div class="form-group">
                <label for="message">Message</label>
                <textarea id="message" placeholder="How can we help?"></textarea>
                <p class="error-text" id="message-error">Please enter a message.</p>
            </div>

            <button type="submit" class="submit-btn">Send Message</button>
        </form>

        <div class="success-message" id="success">
            <div class="success-icon">&#10003;</div>
            <h2>Message Sent</h2>
            <p>Thanks for reaching out. We'll respond as soon as possible.</p>
            <button class="reset-btn" id="reset-btn">Send Another</button>
        </div>
    </div>

    <script>
        const form = document.getElementById('contact-form');
        const success = document.getElementById('success');
        const resetBtn = document.getElementById('reset-btn');
        const nameInput = document.getElementById('name');
        const emailInput = document.getElementById('email');

        function validateEmail(email) {
            return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
        }

        function showError(id, message) {
            const field = document.getElementById(id);
            const error = document.getElementById(id + '-error');
            field.classList.add('error');
            field.classList.remove('valid');
            if (message) error.textContent = message;
            error.classList.add('visible');
        }

        function clearFieldError(id) {
            const field = document.getElementById(id);
            const error = document.getElementById(id + '-error');
            field.classList.remove('error');
            error.classList.remove('visible');
        }

        function markValid(id) {
            const field = document.getElementById(id);
            field.classList.remove('error');
            field.classList.add('valid');
            document.getElementById(id + '-error').classList.remove('visible');
        }

        function clearAll() {
            document.querySelectorAll('.error').forEach(el => el.classList.remove('error'));
            document.querySelectorAll('.valid').forEach(el => el.classList.remove('valid'));
            document.querySelectorAll('.error-text').forEach(el => el.classList.remove('visible'));
        }

        nameInput.addEventListener('blur', () => {
            const val = nameInput.value.trim();
            if (!val) {
                showError('name', 'Name is required.');
            } else {
                markValid('name');
            }
        });

        nameInput.addEventListener('input', () => {
            if (nameInput.value.trim()) clearFieldError('name');
        });

        emailInput.addEventListener('blur', () => {
            const val = emailInput.value.trim();
            if (!val) {
                showError('email', 'Email is required.');
            } else if (!validateEmail(val)) {
                showError('email', 'Please enter a valid email (e.g. you@example.com).');
            } else {
                markValid('email');
            }
        });

        emailInput.addEventListener('input', () => {
            const val = emailInput.value.trim();
            if (val && validateEmail(val)) {
                markValid('email');
            } else {
                clearFieldError('email');
            }
        });

        form.addEventListener('submit', (e) => {
            e.preventDefault();
            clearAll();

            const name = nameInput.value.trim();
            const email = emailInput.value.trim();

            let valid = true;

            if (!name) { showError('name', 'Name is required.'); valid = false; }

            if (!email) {
                showError('email', 'Email is required.');
                valid = false;
            } else if (!validateEmail(email)) {
                showError('email', 'Please enter a valid email (e.g. you@example.com).');
                valid = false;
            }

            if (!valid) return;

            form.style.display = 'none';
            success.classList.add('visible');
        });

        resetBtn.addEventListener('click', () => {
            form.reset();
            clearAll();
            success.classList.remove('visible');
            form.style.display = 'block';
        });
    </script>
</body>
</html>
